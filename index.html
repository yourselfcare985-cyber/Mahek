<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

/* COMMON LAYER FIX */
section{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

/* INTRO */
#intro video{
    width:100%;
    height:100%;
    object-fit:cover;
}

#enterBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 40px;
    border:none;
    border-radius:30px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* MAIN */
#main{ display:none; }

#img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1s;
}

/* TEXT CENTER */
#text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    text-align:center;
    color:white;
    font-size:22px;
    text-shadow:0 0 10px black;
    z-index:2;
}

/* FINAL */
#final{
    display:none;
}

#final img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.5);
}

/* FIXED TEXT AREA */
#finalContent{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    text-align:center;
    color:white;
}

/* FIXED HEADING */
#finalText{
    font-size:40px;
    margin-bottom:20px;
    font-family:'Playfair Display',serif;
}

/* FIXED PARA */
#para{
    font-size:18px;
    line-height:1.5;
}

</style>
</head>

<body>

<!-- INTRO -->
<section id="intro">
    <video autoplay muted loop playsinline>
        <source src="From KlickPin CF Sunset ❤️ _ Beautiful sunsets with flowers - Pin-924434261032503082.mp4" type="video/mp4">
    </video>
    <button id="enterBtn">❤️❤️❤️</button>
</section>

<!-- MAIN -->
<section id="main">
    <img id="img">
    <div id="text"></div>
</section>

<!-- FINAL -->
<section id="final">
    <img src="From KlickPin CF Pin by ROMA on Zeichnungen in 2026 _ Pretty landscapes Beautiful wallpapers backgrounds Beautiful nature wallpaper.jpg">

    <div id="finalContent">
        <div id="finalText">Happy Birthday ❤️</div>
        <div id="para"></div>
    </div>
</section>

<audio id="music" src="Raabta Agent Vinod 320 Kbps.mp3"></audio>

<script>

let images=[
"IMG-20260406-WA0018.jpg",
"IMG-20260406-WA0016.jpg",
"IMG-20260406-WA0015.jpg"
];

let lines=[
"You’ve always been my safe place…",
"Those memories still feel alive…",
"Life feels better with you."
];

let finalPara="You are not just my sister, you are my comfort, my happiness, and my best memory in every phase of life. I’m lucky to have you ❤️";

let i=0;

let img=document.getElementById("img");
let text=document.getElementById("text");
let music=document.getElementById("music");

/* ENTER */
document.getElementById("enterBtn").onclick=()=>{

    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";

    setTimeout(()=>{
        music.currentTime=40;
        music.play().catch(()=>{});
    },1500);

    showSlide();
};

/* SLIDE */
function showSlide(){

    if(i>=images.length){
        showFinal();
        return;
    }

    img.src=images[i];
    img.style.opacity=1;

    typeText(lines[i],()=>{
        i++;
        setTimeout(()=>{
            img.style.opacity=0;
            showSlide();
        },1500);
    });
}

/* TYPE */
function typeText(line,cb){
    text.innerHTML="";
    let j=0;

    let t=setInterval(()=>{
        text.innerHTML+=line[j];
        j++;

        if(j>=line.length){
            clearInterval(t);
            setTimeout(cb,1500);
        }
    },30);
}

/* FINAL */
function showFinal(){
    document.getElementById("main").style.display="none";
    document.getElementById("final").style.display="block";

    typePara(finalPara);
}

/* PARA */
function typePara(txt){
    let el=document.getElementById("para");
    el.innerHTML="";
    let k=0;

    let t=setInterval(()=>{
        el.innerHTML+=txt[k];
        k++;

        if(k>=txt.length){
            clearInterval(t);
        }
    },30);
}

</script>

</body>
</html>
