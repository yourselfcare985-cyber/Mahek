<!DOCTYPE html>
<html lang="en">
<head>

<style>

}

/* INTRO */
#intro{
    position:absolute;
    width:100%;
    height:100%;
}

#bgVideo{
    width:100%;
    height:100%;
    object-fit:cover;
}

#enterBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 40px;
    border:none;
    border-radius:30px;
    font-size:18px;
    background:rgba(255,255,255,0.2);
    color:white;
    backdrop-filter:blur(10px);
    cursor:pointer;
    transition:0.3s;
}
#enterBtn:hover{
    background:white;
    color:black;
}

/* MAIN */
#main{
    display:none;
}

#img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1.5s;
}

#text{
    position:absolute;
    bottom:60px;
    width:100%;
    text-align:center;
    font-size:20px;
    padding:0 20px;
}

/* FINAL SCREEN */
#final{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:black;
}

#finalText{
    position:absolute;
    top:30%;
    width:100%;
    text-align:center;
    font-size:45px;
    font-family:'Playfair Display',serif;
    opacity:0;
    transform:translateY(40px);
    transition:1.5s;
}

#para{
    position:absolute;
    top:55%;
    width:100%;
    text-align:center;
    padding:0 30px;
    font-size:18px;
}

/* animation */
.show{
    opacity:1 !important;
}
.reveal{
    opacity:1 !important;
    transform:translateY(0);
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <video id="bgVideo" autoplay muted loop>
        <source src="From KlickPin CF Sunset ❤️ _ Beautiful sunsets with flowers - Pin-924434261032503082.mp4" type="video/mp4">
    </video>
    <button id="enterBtn">Enter ❤️</button>
</div>

<!-- MAIN -->
<div id="main">

    <div id="text"></div>
</div>

<div id="final">

<audio id="music" src="song.mp3"></audio>

<script>

let images=["IMG-20260406-WA0018.jpg","IMG-20260406-WA0016.jpg","IMG-20260406-WA0015.jpg"];

/* ENTER */
document.getElementById("enterBtn").onclick=()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("music").play();
    show();
};

/* typing */
function type(element,line,cb){
    element.innerHTML="";
    let j=0;
    let t=setInterval(()=>{
        element.innerHTML+=line[j];
        j++;
        if(j>=line.length){
            clearInterval(t);
            setTimeout(cb,1500);
        }
    },40);
}

/* slides */
function show(){
    if(i<images.length){

        img.classList.remove("show");

        setTimeout(()=>{
            img.src=images[i];
            img.classList.add("show");

            type(text,lines[i],()=>{
                i++;
                show();
            });

        },600);

    }else{
        end();
    }
}
