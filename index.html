<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    font-family:'Poppins',sans-serif;
}

/* INTRO */
#intro{
    position:absolute;
    width:100%;
    height:100%;
}

#bgVideo{
    width:100%;
    height:100%;
    object-fit:cover;
}

#enterBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:15px 40px;
    border:none;
    border-radius:30px;
    font-size:18px;
    background:rgba(255,255,255,0.2);
    color:white;
    backdrop-filter:blur(10px);
    cursor:pointer;
}

/* MAIN */
#main{ display:none; }

#img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transform:scale(1.1);
    transition:1.5s ease;
}

.show{
    opacity:1;
    transform:scale(1);
}

#text{
    position:absolute;
    bottom:70px;
    width:100%;
    text-align:center;
    font-size:22px;
    padding:0 20px;
    text-shadow:0 0 10px rgba(0,0,0,0.7);
}

/* FINAL */
#final{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
}

#final img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.5);
}

#finalText{
    position:absolute;
    top:30%;
    width:100%;
    text-align:center;
    font-size:50px;
    font-family:'Playfair Display',serif;
    opacity:0;
    transform:translateY(60px);
    transition:2s;
}

#para{
    position:absolute;
    top:55%;
    width:100%;
    text-align:center;
    padding:0 30px;
    font-size:18px;
}

.reveal{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <video id="bgVideo" autoplay muted loop>
        <source src="" type="video/mp4">
    </video>
    <button id="enterBtn">Enter ❤️</button>
</div>

<!-- MAIN -->
<div id="main">
    <img id="img">
    <div id="text"></div>
</div>

<!-- FINAL -->
<div id="final">
    <img src="final.jpg">
    <div id="finalText">Happy Birthday ❤️</div>
    <div id="para"></div>
</div>

<audio id="music" src="song.mp3"></audio>

<script>

let images=["img1.jpg","img2.jpg","img3.jpg"];

let lines=[
"You’ve always been my safe place…",
"Those memories still feel alive…",
"Life feels better with you."
];

let finalPara="You are not just my sister, you are my comfort, my happiness, and my best memory in every phase of life. I’m lucky to have you ❤️";

let i=0;
let img=document.getElementById("img");
let text=document.getElementById("text");
let music=document.getElementById("music");

/* ENTER */
document.getElementById("enterBtn").onclick=()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
    music.play().catch(()=>{});
    showSlide();
};

/* TYPING with sync */
function typeText(line,callback){
    text.innerHTML="";
    let j=0;

    let interval=setInterval(()=>{
        text.innerHTML+=line[j];
        j++;

        if(j>=line.length){
            clearInterval(interval);
            setTimeout(callback,1500);
        }

    },35);
}

/* SLIDE CONTROL (PERFECT TIMING) */
function showSlide(){

    if(i>=images.length){
        showFinal();
        return;
    }

    img.classList.remove("show");

    setTimeout(()=>{
        img.src=images[i];
        img.classList.add("show");

        typeText(lines[i],()=>{
            i++;
            showSlide();
        });

    },700);
}

/* FINAL */
function showFinal(){
    document.getElementById("main").style.display="none";
    document.getElementById("final").style.display="block";

    setTimeout(()=>{
        document.getElementById("finalText").classList.add("reveal");

        setTimeout(()=>{
            typePara(finalPara);
        },1200);

    },500);
}

/* FINAL PARA TYPING */
function typePara(textLine){
    let el=document.getElementById("para");
    el.innerHTML="";
    let k=0;

    let t=setInterval(()=>{
        el.innerHTML+=textLine[k];
        k++;

        if(k>=textLine.length){
            clearInterval(t);
        }

    },35);
}

</script>

</body>
</html>
