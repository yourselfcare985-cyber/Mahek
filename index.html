<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Sister ❤️</title>

<style>
:root{
    --dark:#121212;
    --accent:#b76e79;
    --light:#f5e6e0;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

html{scroll-behavior:smooth;}

body{
    background:var(--dark);
    color:white;
}

/* DEPTH */
body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle,transparent,black 80%);
    z-index:-1;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1{
    font-size:3rem;
    color:var(--accent);
    border-right:2px solid var(--accent);
    white-space:nowrap;
    overflow:hidden;
}

#subText{
    margin-top:20px;
    opacity:0;
    transition:1.5s;
    color:#ccc;
}

/* SECTION */
.section{
    padding:80px 20px;
    max-width:1100px;
    margin:auto;
}

.title{
    text-align:center;
    color:var(--accent);
    font-size:2rem;
    margin-bottom:40px;
}

/* GALLERY */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:10px;
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
    filter:grayscale(50%);
    transition:0.6s;
}

.card:hover img{
    transform:scale(1.1);
    filter:grayscale(0%);
}

.overlay{
    position:absolute;
    bottom:-60px;
    width:100%;
    padding:15px;
    background:linear-gradient(transparent,black);
    transition:0.4s;
}

.card:hover .overlay{
    bottom:0;
}

/* POLAROID */
.polaroid-wrap{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:40px;
}

.polaroid{
    background:white;
    color:black;
    padding:10px 10px 30px;
    width:260px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transform:rotate(-3deg);
    transition:0.4s;
}

.polaroid:nth-child(even){transform:rotate(3deg);}

.polaroid:hover{
    transform:scale(1.1) rotate(0deg);
}

.polaroid img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.caption{
    text-align:center;
    margin-top:10px;
}

/* FINAL */
.final{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#finalText{
    font-size:3rem;
    opacity:0;
    transition:2s;
    color:var(--accent);
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <h1 id="type"></h1>
    <p id="subText">Not just a sister… my forever person ❤️</p>
</section>

<!-- GALLERY -->
<section class="section">
    <h2 class="title">Our Moments</h2>
    <div class="grid">
        <div class="card">
            <img src="IMG-20260406-WA0015.jpg">
            <div class="overlay">That day we couldn’t stop laughing</div>
        </div>
        <div class="card">
            <img src="IMG-20260406-WA0016.jpg">
            <div class="overlay">Random moments turned memories</div>
        </div>
        <div class="card">
            <img src="IMG-20260406-WA0018.jpg">
            <div class="overlay">No reason… just happiness</div>
        </div>
    </div>
</section>

<!-- MEMORY WALL -->
<section class="section">
    <h2 class="title">Memories That Stayed</h2>
    <div class="polaroid-wrap">
        <div class="polaroid">
            <img src="img4.jpg">
            <div class="caption">Childhood chaos 😂</div>
        </div>
        <div class="polaroid">
            <img src="img5.jpg">
            <div class="caption">Best moment❤️</div>
        </div>
        <div class="polaroid">
            <img src="IMG-20260406-WA0017.jpg">
            <div class="caption">Unforgettable trips</div>
        </div>
    </div>
</section>

<!-- FINAL -->
<section class="final">
    <h1 id="finalText">Happy Birthday ❤️</h1>
    <p style="margin-top:20px;">Some bonds are forever… and ours is one of them.</p>
</section>

<script>

/* TYPEWRITER */
let text="Some people just exist… but you made every moment special.";
let i=0;

function type(){
    if(i<text.length){
        document.getElementById("type").innerHTML+=text[i];
        i++;
        setTimeout(type,50);
    }else{
        document.getElementById("type").style.borderRight="none";
        setTimeout(()=>{
            document.getElementById("subText").style.opacity=1;
        },500);
    }
}

type();

/* FINAL REVEAL */
window.addEventListener("scroll",()=>{
    let final=document.getElementById("finalText");
    let pos=final.getBoundingClientRect().top;
    let screen=window.innerHeight;

    if(pos<screen-100){
        final.style.opacity=1;
    }
});

</script>

</body>
</html>
