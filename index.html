<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sister - Happy Birthday</title>
    <style>
        /* --- Global Variables & Resets --- */
        :root {
            --dark-bg: #121212;
            --rose-gold: #b76e79;
            --light-rose: #e0bfb8;
            --warm-bg: #f4eade;
            --text-light: #f8f8f8;
            --text-dark: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* --- Animations --- */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Hero Section (Typing Effect) --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(18, 18, 18, 0.8), rgba(18, 18, 18, 1)), url('https://placehold.co/1920x1080/2a2a2a/b76e79?text=Dark+Floral+Background') center/cover;
        }

        .hero h1 {
            font-size: 4rem;
            color: var(--rose-gold);
            font-family: 'Georgia', serif;
            margin-bottom: 1rem;
            border-right: 3px solid var(--rose-gold);
            white-space: nowrap;
            overflow: hidden;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--light-rose);
            letter-spacing: 2px;
        }

        /* --- Digital Gallery Section (Sleek & Modern) --- */
        .digital-gallery {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: var(--rose-gold);
            margin-bottom: 3rem;
            font-family: 'Georgia', serif;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: transform 0.6s ease, filter 0.6s ease;
            filter: grayscale(40%);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
            filter: grayscale(0%);
        }

        .gallery-overlay {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            padding: 1.5rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            transition: bottom 0.4s ease;
        }

        .gallery-item:hover .gallery-overlay {
            bottom: 0;
        }

        .gallery-overlay h3 {
            color: var(--rose-gold);
            font-size: 1.2rem;
        }

        /* --- Memory Wall Section (Warm & Nostalgic) --- */
        .memory-wall {
            background-color: var(--warm-bg);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            padding: 6rem 2rem;
            color: var(--text-dark);
        }

        .memory-wall .section-title {
            color: #8b4513;
        }

        .polaroid-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .polaroid {
            background: #fff;
            padding: 1rem 1rem 3rem 1rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 280px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
        }

        /* Random Rotations for Polaroids */
        .polaroid:nth-child(even) { transform: rotate(4deg); }
        .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:nth-child(3n) { transform: rotate(2deg); }

        .polaroid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .polaroid-caption {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Brush Script MT', cursive, sans-serif;
            font-size: 1.4rem;
            color: #333;
        }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) translateY(-10px);
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 2rem;
            background: #0a0a0a;
            color: var(--rose-gold);
            font-size: 1rem;
        }

    </style>
</head>
<body>

    <header class="hero">
        <h1 id="typewriter"></h1>
        <p class="fade-in">A journey of a thousand smiles, just for you.</p>
    </header>

    <section class="digital-gallery">
        <h2 class="section-title fade-in">Elegance & Grace</h2>
        <div class="gallery-grid">
            <div class="gallery-item fade-in">
                <img src="https://placehold.co/600x800/1e1e1e/b76e79?text=Sister+Pic+1" alt="Gallery 1">
                <div class="gallery-overlay">
                    <h3>Always Shining</h3>
                </div>
            </div>
            <div class="gallery-item fade-in" style="transition-delay: 0.2s;">
                <img src="https://placehold.co/600x800/1e1e1e/b76e79?text=Sister+Pic+2" alt="Gallery 2">
                <div class="gallery-overlay">
                    <h3>Fierce & Fabulous</h3>
                </div>
            </div>
            <div class="gallery-item fade-in" style="transition-delay: 0.4s;">
                <img src="https://placehold.co/600x800/1e1e1e/b76e79?text=Sister+Pic+3" alt="Gallery 3">
                <div class="gallery-overlay">
                    <h3>Unstoppable</h3>
                </div>
            </div>
        </div>
    </section>

    <section class="memory-wall">
        <h2 class="section-title fade-in">Our Memory Wall</h2>
        <div class="polaroid-container">
            <div class="polaroid fade-in">
                <img src="https://placehold.co/400x400/e0bfb8/333333?text=Childhood" alt="Childhood Memory">
                <div class="polaroid-caption">Bachpan ki yaadein</div>
            </div>
            <div class="polaroid fade-in" style="transition-delay: 0.2s;">
                <img src="https://placehold.co/400x400/e0bfb8/333333?text=Rakhi" alt="Rakhi Festival">
                <div class="polaroid-caption">Best Rakhi ever ❤️</div>
            </div>
            <div class="polaroid fade-in" style="transition-delay: 0.4s;">
                <img src="https://placehold.co/400x400/e0bfb8/333333?text=Trip" alt="Family Trip">
                <div class="polaroid-caption">Crazy family trips!</div>
            </div>
        </div>
    </section>

    <footer>
        <p>Made with endless love by your brother. Happy Birthday!</p>
    </footer>

    <script>
        // 1. Typewriter Effect for Hero Heading
        const text = "Happy Birthday, Priya! 🎉";
        let i = 0;
        const speed = 100; // Typing speed in milliseconds

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            } else {
                // Remove the cursor border after typing finishes
                document.getElementById("typewriter").style.borderRight = "none";
            }
        }
        
        // Start typing effect on load
        window.onload = typeWriter;

        // 2. Scroll Reveal Animations using Intersection Observer
        const observerOptions = {
            threshold: 0.1, // Trigger when 10% of element is visible
            rootMargin: "0px 0px -50px 0px"
        };

        const observer = new IntersectionObserver(function(entries, observer) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); // Stop observing once visible
                }
            });
        }, observerOptions);

        // Select all elements with class 'fade-in' and observe them
        const faders = document.querySelectorAll('.fade-in');
        faders.forEach(fader => {
            observer.observe(fader);
        });
    </script>
</body>
</html>
