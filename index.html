<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0a0a0a,#2b0f15,#3a0d1a);
    color:white;
    overflow:hidden;
}

/* ENTRY SCREEN */
#entry{
    position:fixed;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    z-index:10;
}

#entry button{
    padding:15px 40px;
    font-size:18px;
    background:transparent;
    border:1px solid #a44553;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

#entry button:hover{
    background:#a44553;
}

/* MAIN */
#main{
    display:none;
    text-align:center;
    padding:40px;
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

h1{
    font-family:'Playfair Display',serif;
    font-size:40px;
    margin-bottom:10px;
}

p{
    opacity:0.8;
    margin-bottom:30px;
}

/* PHOTO GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    overflow:hidden;
    border-radius:15px;
    position:relative;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.5s;
}

.card:hover img{
    transform:scale(1.1);
    filter:brightness(0.8);
}

.card::after{
    content:'❤️';
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:30px;
    opacity:0;
    transition:0.4s;
}

.card:hover::after{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
}

/* FLOATING PARTICLES */
.particle{
    position:absolute;
    width:5px;
    height:5px;
    background:white;
    opacity:0.3;
    border-radius:50%;
    animation:float 10s infinite;
}

@keyframes float{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

</style>
</head>

<body>

<div id="entry">
    <button onclick="enter()">Enter ❤️</button>
</div>

<div id="main">
    <h1>Happy Birthday 🎂</h1>
    <p>You are not just special… you are unforgettable ❤️</p>

    <div class="gallery">
        <div class="card"><img src="photo1.jpg"></div>
        <div class="card"><img src="photo2.jpg"></div>
        <div class="card"><img src="photo3.jpg"></div>
        <div class="card"><img src="photo4.jpg"></div>
    </div>
</div>

<audio id="music" src="music.mp3"></audio>

<script>
function enter(){
    document.getElementById("entry").style.display="none";
    document.getElementById("main").style.display="block";

    let music=document.getElementById("music");
    music.play();
}

/* particles */
for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(5+Math.random()*10)+"s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
