<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:sans-serif;
    overflow:hidden;
}

/* MAIN IMAGE */
#img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    filter:blur(15px) brightness(0.5);
    transform:scale(1.2);
    transition:2s;
}

.show{
    filter:blur(0px) brightness(1);
    transform:scale(1);
}

/* TEXT */
#text{
    position:absolute;
    bottom:80px;
    width:100%;
    text-align:center;
    font-size:20px;
    padding:0 20px;
}

/* BLACK FADE */
#fade{
    position:absolute;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    transition:2s;
    z-index:5;
}

/* FINAL SCREEN */
#finalScreen{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
}

#finalImg{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.6);
}

/* FINAL TEXT */
#finalText{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    font-size:45px;
    opacity:0;
    transition:3s;
}

.reveal{
    opacity:1;
    letter-spacing:8px;
}

</style>
</head>

<body>

<img id="img" src="">
<div id="text"></div>
<div id="fade"></div>

<!-- FINAL SCREEN -->
<div id="finalScreen">
    <img id="finalImg" src="final.jpg">
    <div id="finalText">
        Happy Birthday ❤️ <br>
        <span style="font-size:18px;">You are truly special</span>
    </div>
</div>

<audio id="music" src="song.mp3"></audio>

<script>

let images=[
"IMG-20260406-WA0018.jpg",
"IMG-20260406-WA0016.jpg",
"IMG-20260406-WA0015.jpg"
];

let lines=[
"Some memories just stay… no matter how much time passes.",
"We didn’t realize it then… but those moments meant everything.",
"And honestly… life feels better with you in it."
];

let i=0;
let img=document.getElementById("img");
let text=document.getElementById("text");

/* typing */
function type(line,cb){
    text.innerHTML="";
    let j=0;
    let t=setInterval(()=>{
        text.innerHTML+=line[j];
        j++;
        if(j>=line.length){
            clearInterval(t);
            setTimeout(cb,2000);
        }
    },40);
}

/* slides */
function next(){

    if(i<images.length){

        img.classList.remove("show");

        setTimeout(()=>{
            img.src=images[i];
            img.classList.add("show");

            type(lines[i],()=>{
                i++;
                next();
            });

        },800);

    }else{
        ending();
    }
}

/* ending transition */
function ending(){
    document.getElementById("fade").style.opacity=1;

    setTimeout(()=>{
        document.getElementById("finalScreen").style.display="block";
        document.getElementById("fade").style.opacity=0;

        setTimeout(()=>{
            document.getElementById("finalText").classList.add("reveal");
        },1000);

    },2000);
}

/* start */
setTimeout(()=>{
    document.getElementById("music").play();
    next();
},1000);

</script>

</body>
</html>
