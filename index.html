<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sister ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    text-align:center;
}

/* IMAGE */
#imageBox{
    width:100%;
    height:75vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#imageBox img{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transform:scale(1.1);
    transition:2s ease;
}

.show{
    opacity:1 !important;
    transform:scale(1);
}

/* TEXT */
#text{
    padding:20px;
    font-size:18px;
    min-height:60px;
    opacity:0.9;
}

/* FINAL TEXT */
#final{
    position:absolute;
    top:40%;
    width:100%;
    font-size:40px;
    font-family:'Playfair Display',serif;
    opacity:0;
    letter-spacing:3px;
    transition:2s;
}

.reveal{
    opacity:1 !important;
    letter-spacing:8px;
}

</style>
</head>

<body>

<div id="imageBox">
    <img id="img" src="img1.jpg">
</div>

<div id="text"></div>
<div id="final">Happy Birthday ❤️</div>

<script>

let images = ["IMG-20260406-WA0015.jpg","IMG-20260406-WA0016.jpg","IMG-20260406-WA0018.jpg","IMG-20260406-WA0017.jpg"];

let textLines = [
"You’ve always been more than just a sister… you’ve been my safe place.",
"No matter how much time passes, the memories we share never fade.",
"You’re the one who makes ordinary days feel special.",
"And honestly… life wouldn’t be the same without you."
];

let i = 0;
let img = document.getElementById("img");
let text = document.getElementById("text");

/* typing effect */
function typeLine(line, callback){
    text.innerHTML="";
    let j=0;
    let typing=setInterval(()=>{
        text.innerHTML += line[j];
        j++;
        if(j>=line.length){
            clearInterval(typing);
            setTimeout(callback,1500);
        }
    },40);
}

/* show images */
function showNext(){
    if(i < images.length){
        img.classList.remove("show");

        setTimeout(()=>{
            img.src = images[i];
            img.classList.add("show");
            typeLine(textLines[i], ()=>{
                i++;
                showNext();
            });
        },500);
    } else {
        showFinal();
    }
}

/* final animation */
function showFinal(){
    text.innerHTML="";
    setTimeout(()=>{
        document.getElementById("final").classList.add("reveal");
    },1000);
}

/* start */
setTimeout(()=>{
    img.classList.add("show");
    typeLine(textLines[0], ()=>{
        i=1;
        showNext();
    });
},1000);

</script>

</body>
</html>
